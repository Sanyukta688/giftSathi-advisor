<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Contact - giftSathi-advisor</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-purple-50 font-sans text-gray-700">

  <!-- Header -->
  <header class="bg-gradient-to-r from-purple-600 to-purple-400 text-white text-center py-10 px-5">
    <h1 class="text-4xl font-bold">giftSathi-advisor🎁 </h1>
    <p class="mt-2 opacity-90">Find the Perfect Gift for Every Occasion 💜</p>
  </header>

  <!-- Container -->
  <div class="max-w-6xl mx-auto p-6">

    <!-- Contact Wrapper -->
    <section class="grid md:grid-cols-2 gap-8">

      <!-- Contact Form -->
      <div class="bg-white p-6 rounded-2xl shadow-lg hover:-translate-y-1 transition duration-300">
        <h2 class="text-2xl font-semibold text-purple-600 mb-4">Send Us a Message</h2>

        <form class="flex flex-col gap-3">
          <label class="font-medium">Your Name</label>
          <input type="text" placeholder="Enter your name"
            class="p-2 rounded-lg border focus:outline-none focus:ring-2 focus:ring-purple-500" required />

          <label class="font-medium">Your Email</label>
          <input type="email" placeholder="Enter your email"
            class="p-2 rounded-lg border focus:outline-none focus:ring-2 focus:ring-purple-500" required />

          <label class="font-medium">Your Message</label>
          <textarea rows="5" placeholder="Write your message..."
            class="p-2 rounded-lg border focus:outline-none focus:ring-2 focus:ring-purple-500" required></textarea>

          <button
            class="mt-3 bg-purple-600 text-white py-2 rounded-lg hover:bg-purple-800 transition">
            Send Message 🚀
          </button>
        </form>
      </div>

      <!-- Contact Details -->
      <div class="bg-white p-6 rounded-2xl shadow-lg hover:-translate-y-1 transition duration-300">
        <h2 class="text-2xl font-semibold text-purple-600 mb-4">Contact Details</h2>

        <div class="space-y-4">

          <div class="bg-purple-50 p-4 rounded-lg hover:bg-purple-100 transition">
            <h4 class="font-semibold">📞 Phone</h4>
            <p>+91 98765 43210</p>
          </div>

          <div class="bg-purple-50 p-4 rounded-lg hover:bg-purple-100 transition">
            <h4 class="font-semibold">📧 Email</h4>
            <p>info@giftsathi.com</p>
          </div>

          <div class="bg-purple-50 p-4 rounded-lg hover:bg-purple-100 transition">
            <h4 class="font-semibold">📍 Address</h4>
            <p>xxx</p>
          </div>

        </div>
      </div>

    </section>

    <!-- Social Section -->
    <section class="mt-10 text-center">
      <h2 class="text-2xl font-semibold text-purple-600 mb-4">Follow Us</h2>

      <div class="flex justify-center gap-4 flex-wrap">
        <a href="#" class="bg-purple-600 text-white px-4 py-2 rounded-lg hover:bg-purple-800 transition">Facebook</a>
        <a href="#" class="bg-purple-600 text-white px-4 py-2 rounded-lg hover:bg-purple-800 transition">Instagram</a>
        <a href="#" class="bg-purple-600 text-white px-4 py-2 rounded-lg hover:bg-purple-800 transition">Twitter</a>
        <a href="#" class="bg-purple-600 text-white px-4 py-2 rounded-lg hover:bg-purple-800 transition">LinkedIn</a>
      </div>
    </section>

  </div>

</body>
</html>

<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Birthday Gifts - Gift Store</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">
  <!-- NAVBAR -->
  <nav class="bg-white shadow-md p-3 flex justify-between items-center sticky top-0 z-50">
    <div class="flex items-center gap-6">
      <img src="../gifts/Logo.png" alt="Logo" class="w-24 h-12">
      <div class="relative hidden md:block">
        <input type="text" placeholder="Global search..." onkeyup="handleGlobalSearch(event, this)"
          class="pl-10 pr-4 py-1.5 bg-gray-100 rounded-full text-sm w-64 outline-none focus:ring-2 focus:ring-[#7c3aed] transition-all">
        <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400">🔍</span>
      </div>
    </div>
    <ul class="flex gap-8 font-medium text-sm items-center">
      <li><a href="../index.html" class="hover:text-[#7c3aed] transition duration-300">Home</a></li>
      <li><a href="birthday.html" class="hover:text-[#7c3aed] transition duration-300">Birthday</a></li>
      <li><a href="anniversary.html" class="hover:text-[#7c3aed] transition duration-300">Anniversary</a></li>
      <li><a href="wedding.html" class="hover:text-[#7c3aed] transition duration-300">Wedding</a></li>
      <li><a href="wishlist.html" class="hover:text-[#7c3aed] transition duration-300">❤️ Wishlist</a></li>
      <li><a href="cart.html" class="hover:text-[#7c3aed] transition duration-300">🛒 Cart</a></li>
    </ul>
  </nav>

  <!-- MAIN -->
  <div class="p-6 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8" id="productContainer">
    <!-- Products will be loaded dynamically -->
    <div class="col-span-full py-24 text-center">
      <div
        class="animate-spin inline-block w-8 h-8 border-[3px] border-current border-t-transparent text-[#7c3aed] rounded-full"
        role="status"></div>
      <p class="mt-4 text-gray-500 font-medium">Discovering perfect gifts...</p>
    </div>
  </div>

  <!-- JS -->
  <script src="../logic/product_data.js"></script>
  <script src="../logic/global.js"></script>
  <script src="../logic/cart.js"></script>
  <script src="../logic/products.js"></script>
  <script>
    // Load products dynamically
    document.addEventListener('DOMContentLoaded', function () {
      loadProductsByCategory('Birthday', '#productContainer');
    });
  </script>
</body>

</html>

<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Shopping Cart - Gift Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">
    <!-- NAVBAR -->
    <nav class="bg-white shadow-md p-3 flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-6">
            <img src="../gifts/Logo.png" alt="Logo" class="w-24 h-16">
        </div>
        <ul class="flex gap-7 items-center">
            <li><a href="./pages/wishlist.html" class="hover:text-[#7c3aed] transition duration-300 relative"><img
                        src="../gifts/Wishlist Logo.png" class="w-6"><span id="wishlistCount"
                        class="absolute -top-2 -right-2 text-xs bg-red-500 text-white px-1.5 rounded-full"></span></a>
            </li>
            <li><a href="./pages/cart.html" class="hover:text-[#7c3aed] transition duration-300 relative"><img
                        src="../gifts/Cart Logo.png" class="w-6"><span id="cartCount"
                        class="absolute -top-2 -right-2 text-xs bg-red-500 text-white px-1.5 rounded-full"></span></a>
            </li>
            <li><a href="./pages/login.html" class="hover:text-[#7c3aed] transition duration-300"><img
                        src="../gifts/Account Logo.png" class="w-6"></a></li>
        </ul>
    </nav>

    <!-- MAIN CONTAINER -->
    <div class="p-8 max-w-6xl mx-auto">
        <h1 class="text-4xl font-bold text-[#7c3aed] mb-8">Shopping Cart</h1>

        <!-- PRODUCT DETAIL VIEW (for quick add) -->
        <div id="productDetailView" class="hidden mb-8">
            <div class="bg-white rounded-2xl shadow-md overflow-hidden grid grid-cols-1 md:grid-cols-2 gap-8 p-8 mb-8">
                <!-- Product Image -->
                <div>
                    <img id="detailImage" src="" alt="" class="w-full h-96 object-cover rounded-lg" />
                    <button onclick="goBackToCart()"
                        class="mt-4 w-full px-4 py-2 bg-gray-400 text-white rounded-lg hover:bg-gray-500">Back to
                        Cart</button>
                </div>

                <!-- Product Details -->
                <div>
                    <h2 id="detailName" class="text-3xl font-bold mb-2"></h2>
                    <p id="detailCategory" class="text-sm text-gray-500 mb-4">Category: <span
                            id="detailCategoryValue"></span></p>
                    <p id="detailDescription" class="text-gray-700 mb-6 leading-relaxed"></p>

                    <div class="bg-gray-50 p-4 rounded-lg mb-6">
                        <p class="text-5xl font-bold text-green-600 mb-2">₹<span id="detailPrice"></span></p>
                        <p class="text-gray-600">Free Delivery Available</p>
                    </div>

                    <!-- Quantity Selector -->
                    <div class="mb-6">
                        <label class="block text-gray-700 font-semibold mb-2">Quantity</label>
                        <div class="flex items-center gap-3">
                            <button onclick="decreaseQuantity()"
                                class="px-4 py-2 bg-gray-300 rounded-lg hover:bg-gray-400">-</button>
                            <input type="number" id="quantityInput" value="1" min="1"
                                class="w-16 text-center px-3 py-2 border border-gray-300 rounded-lg" />
                            <button onclick="increaseQuantity()"
                                class="px-4 py-2 bg-gray-300 rounded-lg hover:bg-gray-400">+</button>
                        </div>
                        <p class="text-xs text-gray-500 mt-2">Use quantity to add multiple copies of the same product to
                            the cart.</p>
                    </div>

                    <!-- Action Buttons -->
                    <div class="space-y-3">
                        <button onclick="addCurrentProductToCart()"
                            class="w-full px-6 py-3 bg-[#7c3aed] text-white font-bold rounded-lg hover:bg-[#6d28d9] transition text-lg">
                            Add to Cart
                        </button>
                        <button onclick="addCurrentProductToWishlist()"
                            class="w-full px-6 py-3 bg-gray-200 text-gray-800 font-bold rounded-lg hover:bg-gray-300 transition">
                            ❤️ Add to Wishlist
                        </button>
                    </div>

                    <!-- Order Details -->
                    <div class="mt-8 p-4 bg-blue-50 rounded-lg">
                        <h3 class="font-bold mb-3">Order Summary</h3>
                        <div class="space-y-2 text-sm">
                            <div class="flex justify-between">
                                <span>Price:</span>
                                <span>₹<span id="summaryPrice"></span></span>
                            </div>
                            <div class="flex justify-between">
                                <span>Quantity:</span>
                                <span id="summaryQuantity">1</span>
                            </div>
                            <div class="flex justify-between">
                                <span>Delivery:</span>
                                <span class="text-green-600 font-bold">FREE</span>
                            </div>
                            <div class="border-t pt-2 flex justify-between font-bold">
                                <span>Total:</span>
                                <span>₹<span id="summaryTotal"></span></span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Checkout Button -->
            <button onclick="proceedToCheckout()"
                class="w-full px-6 py-4 bg-green-600 text-white font-bold rounded-lg hover:bg-green-700 transition text-xl">
                Proceed to Checkout
            </button>
        </div>

        <!-- CART ITEMS VIEW -->
        <div id="cartItemsView">
            <div id="cartContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mb-8">
                <p class="col-span-full text-gray-500 text-center py-12">Your cart is empty</p>
            </div>

            <!-- Cart Summary -->
            <div class="bg-white rounded-2xl shadow-md p-8">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div>
                        <p class="text-gray-600">Total Items</p>
                        <p class="text-3xl font-bold"><span id="totalItems">0</span> Items</p>
                    </div>
                    <div>
                        <p class="text-gray-600">Subtotal</p>
                        <p class="text-3xl font-bold">₹<span id="subtotal">0</span></p>
                    </div>
                    <div>
                        <p class="text-gray-600">Total Amount</p>
                        <p class="text-4xl font-bold text-green-600">₹<span id="totalAmount">0</span></p>
                    </div>
                </div>

                <button onclick="proceedToCheckout()"
                    class="w-full mt-6 px-6 py-3 bg-green-600 text-white font-bold rounded-lg hover:bg-green-700 transition text-lg"
                    id="checkoutBtn" style="display: none;">
                    Proceed to Checkout
                </button>
            </div>
        </div>
    </div>

    <!-- JS -->
    <script src="../logic/cart.js"></script>
    <script src="../logic/global.js"></script>
    <script src="../logic/products.js"></script>
</body>

</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Shopping Cart - Gift Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body class="bg-gray-100">
    <!-- NAVBAR -->
    <nav class="bg-white shadow-md p-3 flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-6">
            <img src="../gifts/Logo.jpeg" alt="Logo" class="w-24 h-8">
            <div class="relative hidden md:block">
                <input type="text" 
                       placeholder="Global search..." 
                       onkeyup="handleGlobalSearch(event, this)"
                       class="pl-10 pr-4 py-1.5 bg-gray-100 rounded-full text-sm w-64 outline-none focus:ring-2 focus:ring-[#7c3aed] transition-all">
                <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400">🔍</span>
            </div>
        </div>
        <ul class="flex gap-8 font-medium text-sm items-center">
            <li><a href="../index.html" class="hover:text-[#7c3aed] transition duration-300">Home</a></li>
            <li><a href="wishlist.html" class="hover:text-[#7c3aed] transition duration-300">❤️ Wishlist</a></li>
            <li><a href="cart.html" class="hover:text-[#7c3aed] transition duration-300">🛒 Cart</a></li>
        </ul>
    </nav>

    <!-- MAIN CONTAINER -->
    <div class="p-8 max-w-6xl mx-auto">
      <h1 class="text-4xl font-bold text-[#7c3aed] mb-8">Shopping Cart</h1>

      <!-- PRODUCT DETAIL VIEW (for quick add) -->
      <div id="productDetailView" class="hidden mb-8">
        <div class="bg-white rounded-2xl shadow-md overflow-hidden grid grid-cols-1 md:grid-cols-2 gap-8 p-8 mb-8">
          <!-- Product Image -->
          <div>
            <img id="detailImage" src="" alt="" class="w-full h-96 object-cover rounded-lg" />
            <button onclick="goBackToCart()" class="mt-4 w-full px-4 py-2 bg-gray-400 text-white rounded-lg hover:bg-gray-500">Back to Cart</button>
          </div>

          <!-- Product Details -->
          <div>
            <h2 id="detailName" class="text-3xl font-bold mb-2"></h2>
            <p id="detailCategory" class="text-sm text-gray-500 mb-4">Category: <span id="detailCategoryValue"></span></p>
            <p id="detailDescription" class="text-gray-700 mb-6 leading-relaxed"></p>
            
            <div class="bg-gray-50 p-4 rounded-lg mb-6">
              <p class="text-5xl font-bold text-green-600 mb-2">₹<span id="detailPrice"></span></p>
              <p class="text-gray-600">Free Delivery Available</p>
            </div>

            <!-- Quantity Selector -->
            <div class="mb-6">
              <label class="block text-gray-700 font-semibold mb-2">Quantity</label>
              <div class="flex items-center gap-3">
                <button onclick="decreaseQuantity()" class="px-4 py-2 bg-gray-300 rounded-lg hover:bg-gray-400">-</button>
                <input type="number" id="quantityInput" value="1" min="1" class="w-16 text-center px-3 py-2 border border-gray-300 rounded-lg" />
                <button onclick="increaseQuantity()" class="px-4 py-2 bg-gray-300 rounded-lg hover:bg-gray-400">+</button>
              </div>
              <p class="text-xs text-gray-500 mt-2">Use quantity to add multiple copies of the same product to the cart.</p>
            </div>

            <!-- Action Buttons -->
            <div class="space-y-3">
              <button onclick="addCurrentProductToCart()" class="w-full px-6 py-3 bg-[#7c3aed] text-white font-bold rounded-lg hover:bg-[#6d28d9] transition text-lg">
                Add to Cart
              </button>
              <button onclick="addCurrentProductToWishlist()" class="w-full px-6 py-3 bg-gray-200 text-gray-800 font-bold rounded-lg hover:bg-gray-300 transition">
                ❤️ Add to Wishlist
              </button>
            </div>

            <!-- Order Details -->
            <div class="mt-8 p-4 bg-blue-50 rounded-lg">
              <h3 class="font-bold mb-3">Order Summary</h3>
              <div class="space-y-2 text-sm">
                <div class="flex justify-between">
                  <span>Price:</span>
                  <span>₹<span id="summaryPrice"></span></span>
                </div>
                <div class="flex justify-between">
                  <span>Quantity:</span>
                  <span id="summaryQuantity">1</span>
                </div>
                <div class="flex justify-between">
                  <span>Delivery:</span>
                  <span class="text-green-600 font-bold">FREE</span>
                </div>
                <div class="border-t pt-2 flex justify-between font-bold">
                  <span>Total:</span>
                  <span>₹<span id="summaryTotal"></span></span>
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- Checkout Button -->
        <button onclick="proceedToCheckout()" class="w-full px-6 py-4 bg-green-600 text-white font-bold rounded-lg hover:bg-green-700 transition text-xl">
          Proceed to Checkout
        </button>
      </div>

      <!-- CART ITEMS VIEW -->
      <div id="cartItemsView">
        <div id="cartContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mb-8">
          <p class="col-span-full text-gray-500 text-center py-12">Your cart is empty</p>
        </div>

        <!-- Cart Summary -->
        <div class="bg-white rounded-2xl shadow-md p-8 sticky bottom-0">
          <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div>
              <p class="text-gray-600">Total Items</p>
              <p class="text-3xl font-bold"><span id="totalItems">0</span> Items</p>
            </div>
            <div>
              <p class="text-gray-600">Subtotal</p>
              <p class="text-3xl font-bold">₹<span id="subtotal">0</span></p>
            </div>
            <div>
              <p class="text-gray-600">Total Amount</p>
              <p class="text-4xl font-bold text-green-600">₹<span id="totalAmount">0</span></p>
            </div>
          </div>

          <button onclick="proceedToCheckout()" class="w-full mt-6 px-6 py-3 bg-green-600 text-white font-bold rounded-lg hover:bg-green-700 transition text-lg" id="checkoutBtn" style="display: none;">
            Proceed to Checkout
          </button>
        </div>
      </div>
    </div>

    <!-- JS -->
    <script src="../logic/global.js"></script>
    <script src="../logic/cart.js"></script>
    <script src="../logic/products.js"></script>
    <script>
      let currentProduct = null;

      // Check if product detail view is needed (coming from shop pages)
      const urlParams = new URLSearchParams(window.location.search);
      const productId = urlParams.get('productId');
      const productName = urlParams.get('productName');
      const productPrice = urlParams.get('price');

      if (productId) {
        // Load from admin products
        const products = JSON.parse(localStorage.getItem('products')) || [];
        currentProduct = products.find(p => p.id == productId);
        if (currentProduct) showProductDetail();
      } else if (productName && productPrice) {
        // Static product from URL params
        currentProduct = {
          name: productName,
          price: parseInt(productPrice),
          category: urlParams.get('category') || 'Gift',
          image: urlParams.get('image') || '../gifts/Logo.jpeg',
          description: urlParams.get('description') || `Premium quality ${productName}.`
        };
        showProductDetail();
      } else {
        loadCart();
      }

      function showProductDetail() {
        if (!currentProduct) return;
        
        document.getElementById('productDetailView').classList.remove('hidden');
        document.getElementById('cartItemsView').style.display = 'none';

        document.getElementById('detailImage').src = currentProduct.image;
        document.getElementById('detailName').textContent = currentProduct.name;
        document.getElementById('detailCategoryValue').textContent = currentProduct.category;
        document.getElementById('detailDescription').textContent = currentProduct.description;
        document.getElementById('detailPrice').textContent = currentProduct.price;
        document.getElementById('summaryPrice').textContent = currentProduct.price;
        
        updateDetailSummary();
      }

      function updateDetailSummary() {
        const qty = parseInt(document.getElementById('quantityInput').value);
        const total = currentProduct.price * qty;
        document.getElementById('summaryQuantity').textContent = qty;
        document.getElementById('summaryTotal').textContent = total;
      }

      function increaseQuantity() {
        const input = document.getElementById('quantityInput');
        input.value = parseInt(input.value) + 1;
        updateDetailSummary();
      }

      function decreaseQuantity() {
        const input = document.getElementById('quantityInput');
        if (parseInt(input.value) > 1) {
          input.value = parseInt(input.value) - 1;
          updateDetailSummary();
        }
      }

      function addCurrentProductToCart() {
        const qty = parseInt(document.getElementById('quantityInput').value);
        CartManager.addToCart(currentProduct, qty);
        alert('Product added to cart!');
        window.location.href = 'cart.html';
      }

      function addCurrentProductToWishlist() {
        let wishlist = JSON.parse(localStorage.getItem('wishlist')) || [];
        const productId = currentProduct.id || `${currentProduct.name}-${currentProduct.price}`;
        
        if (!wishlist.includes(productId)) {
          wishlist.push(productId);
          localStorage.setItem('wishlist', JSON.stringify(wishlist));
          alert('Added to wishlist!');
        } else {
          alert('Already in wishlist!');
        }
      }

      function goBackToCart() {
        window.location.href = 'cart.html';
      }

      function loadCart() {
        const cart = CartManager.getCart();
        const container = document.getElementById('cartContainer');
        const totals = CartManager.getTotals();

        if (cart.length === 0) {
          container.innerHTML = '<p class="col-span-full text-gray-500 text-center py-12">Your cart is empty. <a href="../index.html" class="text-[#7c3aed] hover:underline">Continue shopping</a></p>';
          document.getElementById('checkoutBtn').style.display = 'none';
          document.getElementById('totalItems').textContent = 0;
          document.getElementById('subtotal').textContent = 0;
          document.getElementById('totalAmount').textContent = 0;
          return;
        }

        container.innerHTML = cart.map(item => `
          <div class="bg-white rounded-lg shadow-md p-4 hover:shadow-lg transition">
            <img src="${item.image}" alt="${item.name}" class="w-full h-40 object-cover rounded-lg mb-3" />
            <h3 class="font-semibold text-gray-800 mb-2">${item.name}</h3>
            <p class="text-green-600 font-bold mb-2">₹${item.price}</p>
            
            <div class="flex items-center gap-2 mb-3">
              <button onclick="updateCartQuantity('${item.id}', -1)" class="px-2 py-1 bg-gray-300 rounded hover:bg-gray-400">-</button>
              <span class="px-3">${item.quantity}</span>
              <button onclick="updateCartQuantity('${item.id}', 1)" class="px-2 py-1 bg-gray-300 rounded hover:bg-gray-400">+</button>
            </div>

            <p class="text-gray-600 text-sm mb-3">Subtotal: ₹${item.price * item.quantity}</p>
            
            <button onclick="removeFromCart('${item.id}')" class="w-full px-3 py-2 bg-red-500 text-white text-sm rounded hover:bg-red-600">
              Remove
            </button>
          </div>
        `).join('');

        document.getElementById('totalItems').textContent = totals.totalItems;
        document.getElementById('subtotal').textContent = totals.totalAmount;
        document.getElementById('totalAmount').textContent = totals.totalAmount;
        document.getElementById('checkoutBtn').style.display = 'block';
      }

      function updateCartQuantity(id, change) {
        CartManager.updateQuantity(id, change);
        loadCart();
      }

      function removeFromCart(id) {
        if (confirm('Remove this item?')) {
          CartManager.removeFromCart(id);
          loadCart();
        }
      }

      function proceedToCheckout() {
        const totals = CartManager.getTotals();
        alert(`Order Summary:\nTotal Items: ${totals.totalItems}\nTotal Amount: ₹${totals.totalAmount}\n\nThank you for shopping!`);
        CartManager.clearCart();
        window.location.href = '../index.html';
      }
    </script>

    </script>
  </body>
</html>

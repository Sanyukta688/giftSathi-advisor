<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>My Wishlist - Gift Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">
    <!-- NAVBAR -->
    <nav class="bg-white shadow-md p-3 flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-6">
            <button onclick="goBack()"
                class="flex items-center gap-1 px-3 py-1 rounded-lg border hover:bg-gray-100 transition">
                <span class="text-lg">←</span>
                <span class="hidden sm:inline text-sm font-medium"></span>
            </button>
            <img src="/gifts/Logo.png" alt="giftSathi-advisor Logo" class="w-24 h-16">
            <span class="text-xl font-bold text-[#7c3aed]">giftSathi-advisor</span>
        </div>
        <ul class="flex gap-7 items-center">
            <li><a href="./wishlist.html" class="hover:text-[#7c3aed] transition duration-300 relative"><img
                        src="/gifts/Wishlist Logo.png" class="w-6"><span id="wishlistCount"
                        class="absolute -top-2 -right-2 text-xs bg-red-500 text-white px-1.5 rounded-full"></span></a>
            </li>
            <li><a href="./cart.html" class="hover:text-[#7c3aed] transition duration-300 relative"><img
                        src="/gifts/Cart Logo.png" class="w-6"><span id="cartCount"
                        class="absolute -top-2 -right-2 text-xs bg-red-500 text-white px-1.5 rounded-full"></span></a>
            </li>
            <li><a href="./login.html" class="hover:text-[#7c3aed] transition duration-300"><img
                        src="/gifts/Account Logo.png" class="w-6"></a></li>
        </ul>
    </nav>
    <!-- MAIN CONTAINER -->
    <div class="p-8 max-w-6xl mx-auto">
        <div class="mb-8">
            <h1 class="text-4xl font-bold text-[#7c3aed] mb-2">My Wishlist</h1>
            <p class="text-gray-600">Collect the products you like here. Order them later from the cart when you're
                ready.</p>
        </div>

        <!-- WISHLIST ITEMS -->
        <div id="wishlistContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mb-8">
            <p class="col-span-full text-gray-500 text-center py-12">Your wishlist is empty. <a href="../index.html"
                    class="text-[#7c3aed] hover:underline">Start adding your favorite gifts!</a></p>
        </div>

        <!-- WISHLIST SUMMARY -->
        <div id="wishlistSummary" class="bg-white rounded-2xl shadow-md p-8" style="display: none;">
            <h2 class="text-2xl font-bold mb-6 text-gray-800">Wishlist Summary</h2>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <!-- Statistics -->
                <div>
                    <div class="bg-gradient-to-r from-pink-100 to-red-100 rounded-lg p-6 mb-4">
                        <p class="text-gray-600">Total Items</p>
                        <p class="text-4xl font-bold text-red-600" id="totalWishlistItems">0</p>
                    </div>

                    <div class="bg-gradient-to-r from-blue-100 to-purple-100 rounded-lg p-6 mb-4">
                        <p class="text-gray-600">Items by Category</p>
                        <div id="categoryBreakdown" class="mt-3 space-y-2"></div>
                    </div>

                    <button onclick="clearWishlist()"
                        class="w-full px-4 py-2 bg-red-500 text-white rounded-lg hover:bg-red-600 transition">
                        Clear Wishlist
                    </button>
                </div>

                <!-- Actions -->
                <div>
                    <div class="bg-gradient-to-r from-green-100 to-emerald-100 rounded-lg p-6 mb-4">
                        <p class="text-gray-600 mb-3">Total Value</p>
                        <p class="text-4xl font-bold text-green-600">₹<span id="totalWishlistValue">0</span></p>
                        <p class="text-sm text-gray-600 mt-2">If you buy all items</p>
                    </div>

                    <button onclick="addAllToCart()"
                        class="w-full px-4 py-3 bg-[#7c3aed] text-white font-bold rounded-lg hover:bg-[#6d28d9] transition mb-3">
                        💳 Move All to Cart
                    </button>

                    <a href="../index.html"
                        class="block text-center px-4 py-3 bg-gray-200 text-gray-800 font-bold rounded-lg hover:bg-gray-300 transition">
                        Continue Shopping
                    </a>
                </div>
            </div>
        </div>
    </div>

    <!-- JS -->
    <script src="../logic/cart.js"></script>
    <script src="../logic/global.js"></script>
    <script src="../logic/products.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            loadWishlist();
            updateNavbarCounts();
        });

        // Navigation helper
        function goBack() {
            window.history.back();
        }

        function loadWishlist() {
            const wishlist = JSON.parse(localStorage.getItem('wishlist')) || [];
            const products = JSON.parse(localStorage.getItem('products')) || [];
            const container = document.getElementById('wishlistContainer');
            const summary = document.getElementById('wishlistSummary');

            if (!container || !summary) return;

            if (wishlist.length === 0) {
                container.innerHTML = '<p class="col-span-full text-gray-500 text-center py-12">Your wishlist is empty. <a href="../index.html" class="text-[#7c3aed] hover:underline">Start adding your favorite gifts!</a></p>';
                summary.style.display = 'none';
                return;
            }

            // Normalize wishlist items (handle IDs + objects safely)
            const wishlistProducts = wishlist.map(item => {
                if (item && typeof item === 'object') return item;
                return products.find(p => p.id == item);
            }).filter(p => p && p.name && p.price);

            if (wishlistProducts.length === 0) {
                container.innerHTML = '<p class="col-span-full text-gray-500 text-center py-12">No valid products in wishlist</p>';
                summary.style.display = 'none';
                return;
            }

            let totalValue = 0;
            const categoryCount = {};

            window.currentWishlistProducts = wishlistProducts;

            container.innerHTML = wishlistProducts.map((product, index) => {
                const price = parseInt(product.price) || 0;
                totalValue += price;

                const category = product.category || 'Gift';
                categoryCount[category] = (categoryCount[category] || 0) + 1;

                return `
        <div class="bg-white rounded-lg shadow-md overflow-hidden hover:shadow-lg transition">
          <div class="relative">
            <img src="${product.image || '/gifts/Logo.png'}" class="w-full h-40 object-cover" />
            <span class="absolute top-2 left-2 bg-red-500 text-white px-3 py-1 rounded-full text-sm">❤️ Liked</span>
          </div>

          <div class="p-4">
            <h3 class="font-semibold text-gray-800 mb-1">${product.name}</h3>
            <p class="text-sm text-gray-500 mb-2">Category: <span class="font-medium text-[#7c3aed]">${category}</span></p>
            <p class="text-green-600 font-bold text-lg mb-3">₹${price}</p>
            <p class="text-sm text-gray-600 mb-3">${product.description || 'Saved item for later purchase.'}</p>

            <div class="space-y-2">
              <button onclick="viewWishlistItem(${index})" class="w-full px-3 py-2 bg-green-500 text-white text-sm rounded hover:bg-green-600 transition">
                View Details
              </button>
              <button onclick="moveWishlistItemToCart('${product.id || product.name}')" class=" w-full bg-[#7c3aed] text-white px-3 py-2 rounded-sm text-sm hover:bg-purple-700 transition">
                Move to Cart
              </button>
              <button onclick="removeFromWishlist('${product.id || product.name}')" class="w-full px-3 py-2 bg-red-500 text-white text-sm rounded hover:from-red-600 hover:to-pink-600 transition">
                Remove
              </button>
            </div>
          </div>
        </div>
        `;
            }).join('');

            document.getElementById('totalWishlistItems').textContent = wishlistProducts.length;
            document.getElementById('totalWishlistValue').textContent = totalValue;

            document.getElementById('categoryBreakdown').innerHTML =
                Object.entries(categoryCount)
                    .map(([cat, count]) =>
                        `<p class="text-sm"><span class="font-medium">${cat}:</span> ${count} item${count > 1 ? 's' : ''}</p>`
                    ).join('');

            summary.style.display = 'block';
        }

        // Remove item
        function removeFromWishlist(itemId) {
            let wishlist = JSON.parse(localStorage.getItem('wishlist')) || [];

            wishlist = wishlist.filter(item => {
                const id = (typeof item === 'object') ? item.id : item;
                return id != itemId;
            });

            localStorage.setItem('wishlist', JSON.stringify(wishlist));
            loadWishlist();
            updateNavbarCounts();
        }

        // Clear wishlist
        function clearWishlist() {
            if (confirm('Are you sure you want to clear your entire wishlist?')) {
                localStorage.setItem('wishlist', JSON.stringify([]));
                loadWishlist();
                updateNavbarCounts();
            }
        }

        // Move all to cart
        function addAllToCart() {
            const wishlistProducts = window.currentWishlistProducts || [];

            wishlistProducts.forEach(product => {
                CartManager.addToCart(product);
            });

            localStorage.setItem('wishlist', JSON.stringify([]));
            alert('All items moved to cart!');
            window.location.href = 'cart.html';
        }

        // View item
        function viewWishlistItem(index) {
            const product = window.currentWishlistProducts?.[index];
            if (!product) return;

            const params = new URLSearchParams({
                productName: product.name,
                price: product.price,
                category: product.category || 'Gift',
                image: product.image || '',
                description: product.description || ''
            });

            if (product.id) params.set('productId', product.id);

            window.location.href = `cart.html?${params.toString()}`;
        }

        // Move single item
        function moveWishlistItemToCart(itemId) {
            const product = window.currentWishlistProducts?.find(p => (p.id || p.name) == itemId);

            if (product) {
                CartManager.addToCart(product);
                removeFromWishlist(itemId);
                alert('Item moved to cart!');
            }
        }

        // Navbar counts (SAFE fallback)
        function updateNavbarCounts() {
            const wishlist = JSON.parse(localStorage.getItem('wishlist')) || [];
            const cart = JSON.parse(localStorage.getItem('cart')) || [];

            const wishlistCount = document.getElementById('wishlistCount');
            const cartCount = document.getElementById('cartCount');

            if (wishlistCount) wishlistCount.textContent = wishlist.length;
            if (cartCount) {
                const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
                cartCount.textContent = totalItems;
            }
        }
    </script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Sign In | GiftMagic</title>
</head>
<body class="bg-gradient-to-br from-purple-100 to-purple-50 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white rounded-3xl shadow-2xl overflow-hidden max-w-4xl w-full flex flex-col md:flex-row">
        
        <!-- Left Side -->
        <div class="md:w-1/2 bg-purple-600 py-3 px-3 text-white flex flex-col justify-center items-center text-center space-y-6">
            <div class="bg-white/20 p-4 rounded-full">
                <svg xmlns="http://w3.org" class="h-12 w-12" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v13m0-13V6a2 2 0 112 2h-2zm0 0V5.5A2.5 2.5 0 109.5 8H12zm-7 4h14M5 12a2 2 0 110-4h14a2 2 0 110 4M5 12v7a2 2 0 002 2h10a2 2 0 002-2v-7" />
                </svg>
            </div>
            <h1 class="text-4xl font-bold tracking-tight">Wrap a Smile Today! 🎁</h1>
            <div class="pt-4 border-t border-purple-400 w-full text-sm italic">
                "Giving is the master key to happiness."
            </div>
        </div>

        <!-- Right Side -->
        <div class="md:w-1/2 p-8 md:p-12">
            <h2 class="text-2xl font-bold text-gray-800 mb-2">Welcome Back</h2>
            <p class="text-gray-500 mb-8 text-sm">Please enter your details to start gifting.</p>

            <form class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
                    <input type="email" placeholder="hello@example.com"
                        class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-purple-500 focus:border-transparent outline-none transition">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                    <input type="password" placeholder="••••••••"
                        class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-purple-500 focus:border-transparent outline-none transition">
                </div>

                <div class="flex items-center justify-between text-sm">
                    <label class="flex items-center text-gray-600">
                        <input type="checkbox" class="mr-2 rounded text-purple-600 focus:ring-purple-500"> Remember me
                    </label>
                    <a href="#" class="text-purple-600 font-semibold hover:underline">Forgot password?</a>
                </div>

                <button class="w-full bg-purple-600 hover:bg-purple-700 text-white font-bold py-3 rounded-xl shadow-lg transform transition active:scale-95">
                    Enter the Shop
                </button>
            </form>

            <div class="mt-8 text-center">
                <p class="text-gray-600 text-sm">New here? 
                    <a href="#" class="text-purple-600 font-bold hover:underline">Create an account</a>
                </p>
            </div>
        </div>
    </div>

</body>
</html>

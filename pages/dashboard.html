<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Admin - Add Products</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen">
  <!-- NAVBAR -->

  <nav class="bg-white shadow-md px-4 sm:px-6 flex justify-between items-center sticky top-0 z-50">

  <!-- Left Side -->
  <div class="flex items-center gap-4">

    <!-- Back Button -->
    <button onclick="goBack()" 
        class="flex items-center gap-1 px-3 py-1 rounded-lg border hover:bg-gray-100 transition">
      <span class="text-lg">←</span>
      <span class="hidden sm:inline text-sm font-medium"></span>
    </button>

    <!-- Logo -->
    <img src="../gifts/Logo.png" alt="giftSathi-advisor Logo" class="w-24 h-16">
            <span class="text-xl font-bold text-[#7c3aed]">giftSathi-advisor</span>

  </div>

  <!-- Right Side -->
  <ul class="flex gap-5 sm:gap-7 items-center">

    <li class="relative">
      <a href="./wishlist.html">
        <img src="../gifts/Wishlist Logo.png" class="w-6">
        <span id="wishlistCount"
              class="absolute -top-2 -right-2 text-xs bg-red-500 text-white px-1.5 rounded-full"></span>
      </a>
    </li>

    <li class="relative">
      <a href="./cart.html">
        <img src="../gifts/Cart Logo.png" class="w-6">
        <span id="cartCount"
              class="absolute -top-2 -right-2 text-xs bg-red-500 text-white px-1.5 rounded-full"></span>
      </a>
    </li>

    <li>
      <a href="./login.html">
        <img src="../gifts/Account Logo.png" class="w-6">
      </a>
    </li>

  </ul>

</nav>

  <!-- MAIN CONTAINER -->
  <div class="w-full px-4 sm:px-6 lg:px-10 py-6">
    <!-- HEADER -->
    <div class="mb-8 text-center">
      <h1 class="text-4xl font-bold text-[#7c3aed] mb-2">Admin Panel</h1>
      <p class="text-gray-600">Add new products to your gift store</p>
    </div>

    <!-- ADD PRODUCT FORM -->
    <div class="bg-white rounded-2xl shadow-md p-8 mb-8">
      <h2 class="text-2xl font-bold mb-6 text-gray-800">Add New Product</h2>

      <form id="productForm" class="space-y-6">
        <!-- Product Name -->
        <div>
          <label class="block text-gray-700 font-semibold mb-2">Product Name</label>
          <input type="text" id="productName" placeholder="Enter product name"
            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#7c3aed]"
            required />
        </div>

        <!-- Price -->
        <div>
          <label class="block text-gray-700 font-semibold mb-2">Price (₹)</label>
          <input type="number" id="productPrice" placeholder="Enter price" min="0" step="10"
            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#7c3aed]"
            required />
        </div>

        <!-- Category Selection -->
        <div>
          <label class="block text-gray-700 font-semibold mb-2">Category</label>
          <select id="productCategory"
            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#7c3aed]"
            required>
            <option value="">-- Select Category --</option>
            <option value="Birthday">Birthday</option>
            <option value="Anniversary">Anniversary</option>
            <option value="Baby">Baby</option>
            <option value="Couple">Couple</option>
            <option value="Festival">Festival</option>
            <option value="Creative">Creative</option>
            <option value="Friendship">Friendship</option>
            <option value="Home">Home</option>
            <option value="Tech">Tech</option>
            <option value="Fitness">Fitness</option>
            <option value="Travel">Travel</option>
            <option value="General">General</option>
            <option value="Leftover">Leftover</option>
          </select>
        </div>

        <!-- Image Upload -->
        <div>
          <label class="block text-gray-700 font-semibold mb-2">Product Image</label>
          <div class="flex gap-4">
            <input type="file" id="productImage" accept="image/*"
              class="flex-1 px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#7c3aed]"
              required />
            <button type="button" onclick="previewImage()"
              class="px-6 py-2 bg-[#7c3aed] text-white rounded-lg hover:bg-[#6d28d9] transition">
              Preview
            </button>
          </div>
          <!-- Image Preview -->
          <div id="imagePreview" class="mt-4">
            <img id="previewImg" src="" alt="Preview"
              class="hidden w-32 h-32 object-cover rounded-lg border border-gray-300" />
          </div>
        </div>

        <!-- Buttons -->
        <div class="flex gap-4 pt-4">
          <button type="submit"
            class="flex-1 px-6 py-3 bg-[#7c3aed] text-white font-semibold rounded-lg hover:bg-[#6d28d9] transition">
            Add Product
          </button>
          <button type="reset"
            class="flex-1 px-6 py-3 bg-gray-400 text-white font-semibold rounded-lg hover:bg-gray-500 transition">
            Clear Form
          </button>
        </div>
      </form>
    </div>

    <!-- Quick Add Modal -->
    <div id="quickAddModal"
      class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 px-4">

      <!-- Modal Box -->
      <div class="bg-white rounded-2xl p-4 sm:p-6 w-full max-w-md max-h-[90vh] overflow-y-auto">

        <!-- Image -->
        <img id="modalImage" src="" alt="Product" class="w-full h-40 sm:h-48 object-cover rounded-lg mb-4" />

        <!-- Title -->
        <h3 id="modalImageName" class="text-lg sm:text-xl font-bold mb-4 text-center sm:text-left"></h3>

        <div class="space-y-4">

          <!-- Product Name -->
          <div>
            <label class="block text-gray-700 font-semibold mb-1 sm:mb-2 text-sm sm:text-base">
              Product Name
            </label>
            <input type="text" id="quickProductName" placeholder="Enter product name"
              class="w-full px-3 py-2 text-sm sm:text-base border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#7c3aed]" />
          </div>

          <!-- Price -->
          <div>
            <label class="block text-gray-700 font-semibold mb-1 sm:mb-2 text-sm sm:text-base">
              Price (₹)
            </label>
            <input type="number" id="quickProductPrice" placeholder="Enter price" min="0" step="10"
              class="w-full px-3 py-2 text-sm sm:text-base border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#7c3aed]" />
          </div>

          <!-- Category -->
          <div>
            <label class="block text-gray-700 font-semibold mb-1 sm:mb-2 text-sm sm:text-base">
              Category
            </label>
            <select id="quickProductCategory"
              class="w-full px-3 py-2 text-sm sm:text-base border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#7c3aed]">
              <option value="">-- Select Category --</option>
              <option>Birthday</option>
              <option>Anniversary</option>
              <option>Baby</option>
              <option>Couple</option>
              <option>Festival</option>
              <option>Creative</option>
              <option>Friendship</option>
              <option>Home</option>
              <option>Tech</option>
              <option>Fitness</option>
              <option>Travel</option>
              <option>General</option>
              <option>Leftover</option>
            </select>
          </div>

          <!-- Buttons -->
          <div class="flex flex-col sm:flex-row gap-3 pt-2">
            <button onclick="addQuickProduct()"
              class="w-full px-4 py-2 bg-[#7c3aed] text-white rounded-lg hover:bg-[#6d28d9]">
              Add Product
            </button>

            <button onclick="closeQuickAddModal()"
              class="w-full px-4 py-2 bg-gray-400 text-white rounded-lg hover:bg-gray-500">
              Cancel
            </button>
          </div>

        </div>
      </div>
    </div>

    <!-- PRODUCTS LIST -->
    <div class="w-full bg-white rounded-2xl shadow-md p-4 sm:p-6 lg:p-8">

      <!-- Heading -->
      <h2
        class="text-xl sm:text-2xl md:text-3xl lg:text-4xl font-bold mb-4 sm:mb-6 text-gray-800 text-center sm:text-left">
        Added Products
      </h2>

      <!-- Product Grid -->
      <div id="productsList" class="grid gap-6 sm:grid-cols-2 lg:grid-cols-4">
        <p class="col-span-full text-gray-500 text-center py-8">
          No products added yet
        </p>
      </div>
    </div>

    <!-- JS -->
    <script src="../logic/products_data.js"></script>
    <script src="../logic/global.js"></script>
    <script src="../logic/dashboard.js"></script>
    
    <script>
    function goBack() {
    window.history.back();
    }
    </script>
</body>

</html>

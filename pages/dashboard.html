<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Admin - Add Products</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body class="bg-gray-100">
    <!-- NAVBAR -->
    <nav class="bg-white shadow-md p-3 flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-6">
            <img src="../gifts/Logo.jpeg" alt="Logo" class="w-24 h-8">
            <div class="relative hidden md:block">
                <input type="text" 
                       placeholder="Global search..." 
                       onkeyup="handleGlobalSearch(event, this)"
                       class="pl-10 pr-4 py-1.5 bg-gray-100 rounded-full text-sm w-64 outline-none focus:ring-2 focus:ring-[#7c3aed] transition-all">
                <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400">🔍</span>
            </div>
        </div>
        <ul class="flex gap-8 font-medium text-sm items-center">
            <li><a href="../index.html" class="hover:text-[#7c3aed] transition duration-300">Home</a></li>
            <li><a href="wishlist.html" class="hover:text-[#7c3aed] transition duration-300">❤️ Wishlist</a></li>
            <li><a href="cart.html" class="hover:text-[#7c3aed] transition duration-300">🛒 Cart</a></li>
        </ul>
    </nav>

    <!-- MAIN CONTAINER -->
    <div class="p-8 max-w-4xl mx-auto">
      <!-- HEADER -->
      <div class="mb-8">
        <h1 class="text-4xl font-bold text-[#7c3aed] mb-2">Admin Panel</h1>
        <p class="text-gray-600">Add new products to your gift store</p>
      </div>

      <!-- ADD PRODUCT FORM -->
      <div class="bg-white rounded-2xl shadow-md p-8 mb-8">
        <h2 class="text-2xl font-bold mb-6 text-gray-800">Add New Product</h2>
        
        <form id="productForm" class="space-y-6">
          <!-- Product Name -->
          <div>
            <label class="block text-gray-700 font-semibold mb-2">Product Name</label>
            <input 
              type="text" 
              id="productName" 
              placeholder="Enter product name" 
              class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#7c3aed]"
              required
            />
          </div>

          <!-- Price -->
          <div>
            <label class="block text-gray-700 font-semibold mb-2">Price (₹)</label>
            <input 
              type="number" 
              id="productPrice" 
              placeholder="Enter price" 
              min="0" 
              step="10"
              class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#7c3aed]"
              required
            />
          </div>

          <!-- Category Selection -->
          <div>
            <label class="block text-gray-700 font-semibold mb-2">Category</label>
            <select 
              id="productCategory" 
              class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#7c3aed]"
              required
            >
              <option value="">-- Select Category --</option>
              <option value="Birthday">Birthday</option>
              <option value="Anniversary">Anniversary</option>
              <option value="Baby">Baby</option>
              <option value="Couple">Couple</option>
              <option value="Festival">Festival</option>
              <option value="Creative">Creative</option>
              <option value="Friendship">Friendship</option>
              <option value="Home">Home</option>
              <option value="Tech">Tech</option>
              <option value="Fitness">Fitness</option>
              <option value="Travel">Travel</option>
              <option value="General">General</option>
              <option value="Leftover">Leftover</option>
            </select>
          </div>

          <!-- Image Upload -->
          <div>
            <label class="block text-gray-700 font-semibold mb-2">Product Image</label>
            <div class="flex gap-4">
              <input 
                type="file" 
                id="productImage" 
                accept="image/*" 
                class="flex-1 px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#7c3aed]"
                required
              />
              <button 
                type="button" 
                onclick="previewImage()" 
                class="px-6 py-2 bg-[#7c3aed] text-white rounded-lg hover:bg-[#6d28d9] transition"
              >
                Preview
              </button>
            </div>
            <!-- Image Preview -->
            <div id="imagePreview" class="mt-4">
              <img id="previewImg" src="" alt="Preview" class="hidden w-32 h-32 object-cover rounded-lg border border-gray-300" />
            </div>
          </div>

          <!-- Buttons -->
          <div class="flex gap-4 pt-4">
            <button 
              type="submit" 
              class="flex-1 px-6 py-3 bg-[#7c3aed] text-white font-semibold rounded-lg hover:bg-[#6d28d9] transition"
            >
              Add Product
            </button>
            <button 
              type="reset" 
              class="flex-1 px-6 py-3 bg-gray-400 text-white font-semibold rounded-lg hover:bg-gray-500 transition"
            >
              Clear Form
            </button>
          </div>
        </form>
      </div>

      <!-- IMAGE GALLERY FOR QUICK ADD -->
      <div class="bg-white rounded-2xl shadow-md p-8 mb-8">
        <h2 class="text-2xl font-bold mb-6 text-gray-800">Quick Add from Gallery</h2>
        <p class="text-gray-600 mb-4">Select an image from your gifts folder to quickly add as a product</p>
        
        <div id="galleryContainer" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4">
          <div class="flex items-center justify-center h-24 bg-gray-200 rounded-lg">
            <span class="text-gray-500 text-sm">Loading gallery...</span>
          </div>
        </div>

        <!-- Quick Add Modal -->
        <div id="quickAddModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
          <div class="bg-white rounded-lg p-6 max-w-sm w-full mx-4">
            <img id="modalImage" src="" alt="Product" class="w-full h-48 object-cover rounded-lg mb-4" />
            <h3 id="modalImageName" class="text-xl font-bold mb-4"></h3>
            
            <div class="space-y-4">
              <div>
                <label class="block text-gray-700 font-semibold mb-2">Product Name</label>
                <input type="text" id="quickProductName" placeholder="Enter product name" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#7c3aed]" />
              </div>
              
              <div>
                <label class="block text-gray-700 font-semibold mb-2">Price (₹)</label>
                <input type="number" id="quickProductPrice" placeholder="Enter price" min="0" step="10" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#7c3aed]" />
              </div>
              
              <div>
                <label class="block text-gray-700 font-semibold mb-2">Category</label>
                <select id="quickProductCategory" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#7c3aed]">
                  <option value="">-- Select Category --</option>
                  <option value="Birthday">Birthday</option>
                  <option value="Anniversary">Anniversary</option>
                  <option value="Baby">Baby</option>
                  <option value="Couple">Couple</option>
                  <option value="Festival">Festival</option>
                  <option value="Creative">Creative</option>
                  <option value="Friendship">Friendship</option>
                  <option value="Home">Home</option>
                  <option value="Tech">Tech</option>
                  <option value="Fitness">Fitness</option>
                  <option value="Travel">Travel</option>
                  <option value="General">General</option>
                  <option value="Leftover">Leftover</option>
                </select>
              </div>
              
              <div class="flex gap-3 pt-2">
                <button onclick="addQuickProduct()" class="flex-1 px-4 py-2 bg-[#7c3aed] text-white rounded-lg hover:bg-[#6d28d9]">Add Product</button>
                <button onclick="closeQuickAddModal()" class="flex-1 px-4 py-2 bg-gray-400 text-white rounded-lg hover:bg-gray-500">Cancel</button>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- PRODUCTS LIST -->
      <div class="bg-white rounded-2xl shadow-md p-8">
        <h2 class="text-2xl font-bold mb-6 text-gray-800">Added Products</h2>
        <div id="productsList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
          <p class="col-span-full text-gray-500 text-center py-8">No products added yet</p>
        </div>
      </div>
    </div>

    <!-- JS -->
    <script src="../logic/products_data.js"></script>
    <script src="../logic/global.js"></script>
    <script src="../logic/dashboard.js"></script>
    
  </body>
</html>

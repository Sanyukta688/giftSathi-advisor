<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Creative Gifts - Gift Store</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">
  <!-- NAVBAR -->
  <nav class="bg-white shadow-md p-3 flex justify-between items-center sticky top-0 z-50">
    <div class="flex items-center gap-6">
      <button onclick="goBack()"
        class="flex items-center gap-1 px-3 py-1 rounded-lg border hover:bg-gray-100 transition">
        <span class="text-lg">←</span>
        <span class="hidden sm:inline text-sm font-medium"></span>
      </button>
      <img src="/gifts/Logo.png" alt="giftSathi-advisor Logo" class="w-24 h-16">
      <span class="text-xl font-bold text-[#7c3aed]">giftSathi-advisor</span>
    </div>
    <ul class="flex gap-7 items-center">
      <li><a href="./wishlist.html" class="hover:text-[#7c3aed] transition duration-300 relative"><img
            src="/gifts/Wishlist Logo.png" class="w-6"><span id="wishlistCount"
            class="absolute -top-2 -right-2 text-xs bg-red-500 text-white px-1.5 rounded-full"></span></a>
      </li>
      <li><a href="./cart.html" class="hover:text-[#7c3aed] transition duration-300 relative"><img
            src="/gifts/Cart Logo.png" class="w-6"><span id="cartCount"
            class="absolute -top-2 -right-2 text-xs bg-red-500 text-white px-1.5 rounded-full"></span></a>
      </li>
      <li><a href="./login.html" class="hover:text-[#7c3aed] transition duration-300"><img
            src="/gifts/Account Logo.png" class="w-6"></a></li>
    </ul>
  </nav>

  <!-- MAIN -->
  <div class="p-6 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8" id="productContainer">
    <!-- Products will be loaded dynamically -->
    <div class="col-span-full py-24 text-center">
      <div
        class="animate-spin inline-block w-8 h-8 border-[3px] border-current border-t-transparent text-[#7c3aed] rounded-full"
        role="status"></div>
      <p class="mt-4 text-gray-500 font-medium">Discovering perfect gifts...</p>
    </div>
  </div>

  <!-- JS -->
  <script src="../logic/product_data.js"></script>
  <script src="../logic/global.js"></script>
  <script src="../logic/cart.js"></script>
  <script src="../logic/products.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      loadProductsByCategory('Creative', '.p-6');
    });

    function toggleLike(btn) {
      btn.innerHTML = btn.innerHTML === "🤍" ? "❤️" : "🤍";
    }

    function addToCart(name, price) {
      alert(name + " added to cart - ₹" + price);
    }

    function goBack() {
      window.history.back();
    }
  </script>
</body>

</html>
